<div id="login-overlay" class="login-overlay">
    <div class="login-box">
        <img src="assests\logo.png" alt="EdWatch Logo" class="login-logo">
        <h2>Welcome to EdWatch Training</h2>
        <p class="login-subtitle">Enter your details to begin</p>

        <input type="text" id="login-name" placeholder="Full Name" autocomplete="name">
        <input type="email" id="login-email" placeholder="Email Address" autocomplete="email">

        <button id="login-submit" class="btn btn-primary login-btn">Continue</button>
        <p id="login-error" class="login-error"></p>
    </div>
</div>

<!-- Small "logged in as" badge, shown after login, in the navbar -->
<!-- Add this <li> inside your existing <ul class="nav-menu" id="nav-menu"> -->
<li class="nav-item" id="nav-user-badge" style="display:none;">
    <span class="nav-link" id="nav-user-name"></span>
</li>


<!-- ============================================================ -->
<!-- 2. ADD THIS CSS to style.css (or a <style> block)             -->
<!-- ============================================================ -->
<style>
.login-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 15, 30, 0.92);
    backdrop-filter: blur(6px);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
}
.login-overlay.hidden { display: none; }

.login-box {
    background: #ffffff;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 90%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.login-logo { width: 64px; margin: 0 auto 1rem; display: block; }
.login-box h2 { margin: 0 0 0.25rem; font-size: 1.4rem; color: #111; }
.login-subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }

.login-box input {
    width: 100%;
    padding: 0.75rem 1rem;
    margin-bottom: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 0.95rem;
    box-sizing: border-box;
}
.login-box input:focus { outline: none; border-color: #4f46e5; }

.login-btn {
    width: 100%;
    margin-top: 0.5rem;
    cursor: pointer;
    border: none;
}
.login-error {
    color: #dc2626;
    font-size: 0.85rem;
    margin-top: 0.75rem;
    min-height: 1.2em;
}

/* Gate the activities section until login completes */
.activities-locked { opacity: 0.4; pointer-events: none; filter: blur(2px); }
</style>


<!-- ============================================================ -->
<!-- 3. ADD THIS SCRIPT before your existing closing </script>     -->
<!--    (or as a new <script> tag right before </body>)            -->
<!-- ============================================================ -->
<script>
// ---- CONFIG: paste your Apps Script Web App URL here ----
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPUk8Ft-skhARn3gAwLy3NximnXyXg_Q4O5uCsTLSi5yUE9nR6f5L3ygHSnn_N4sWbkQ/exec'; // ends in /exec

const loginOverlay = document.getElementById('login-overlay');
const loginNameInput = document.getElementById('login-name');
const loginEmailInput = document.getElementById('login-email');
const loginSubmitBtn = document.getElementById('login-submit');
const loginError = document.getElementById('login-error');
const navUserBadge = document.getElementById('nav-user-badge');
const navUserName = document.getElementById('nav-user-name');
const activitiesSection = document.querySelector('.activities');

function showLoggedInState(name, email) {
    loginOverlay.classList.add('hidden');
    activitiesSection.classList.remove('activities-locked');
    navUserBadge.style.display = 'inline-block';
    navUserName.textContent = '👤 ' + name;
}

// On page load: check if user already has a session
window.addEventListener('DOMContentLoaded', () => {
    activitiesSection.classList.add('activities-locked');

    const savedName = localStorage.getItem('edwatch_name');
    const savedEmail = localStorage.getItem('edwatch_email');

    if (savedName && savedEmail) {
        // Already logged in this browser — skip the form
        showLoggedInState(savedName, savedEmail);
    }
});

loginSubmitBtn.addEventListener('click', async () => {
    const name = loginNameInput.value.trim();
    const email = loginEmailInput.value.trim();

    if (!name || !email) {
        loginError.textContent = 'Please enter both name and email.';
        return;
    }
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
        loginError.textContent = 'Please enter a valid email address.';
        return;
    }

    loginSubmitBtn.disabled = true;
    loginSubmitBtn.textContent = 'Logging in...';
    loginError.textContent = '';

    try {
        const url = `${APPS_SCRIPT_URL}?action=login&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data.success) {
            localStorage.setItem('edwatch_name', data.name || name);
            localStorage.setItem('edwatch_email', email);
            showLoggedInState(data.name || name, email);
        } else {
            loginError.textContent = data.error || 'Login failed. Please try again.';
        }
    } catch (err) {
        loginError.textContent = 'Could not connect. Check your internet connection.';
    } finally {
        loginSubmitBtn.disabled = false;
        loginSubmitBtn.textContent = 'Continue';
    }
});

// Allow pressing Enter in the email field to submit
loginEmailInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginSubmitBtn.click();
});
</script>
